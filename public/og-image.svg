  <text x="880" y="420" font-family="serif" font-size="110" fill="rgba(255,255,255,0.1)">σ²</text>
  <text x="750" y="350" font-family="serif" font-size="90" fill="rgba(255,255,255,0.08)">∫</text>
</svg>
