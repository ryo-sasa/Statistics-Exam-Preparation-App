<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="100" y="200" font-family="sans-serif" font-size="72" font-weight="bold" fill="white">統計検定道場</text>
  <text x="100" y="280" font-family="sans-serif" font-size="32" fill="rgba(255,255,255,0.85)">Statistical Learning Hub</text>
  <line x1="100" y1="320" x2="400" y2="320" stroke="rgba(255,255,255,0.5)" stroke-width="3"/>
  <text x="100" y="390" font-family="sans-serif" font-size="28" fill="rgba(255,255,255,0.9)">準1級・2級・1級 対応</text>
  <text x="100" y="440" font-family="sans-serif" font-size="28" fill="rgba(255,255,255,0.9)">教科書 × 問題演習 × 模擬試験</text>
  <text x="100" y="490" font-family="sans-serif" font-size="28" fill="rgba(255,255,255,0.9)">23トピック・184問の充実コンテンツ</text>
